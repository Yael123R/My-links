<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yael Huamani — Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-pink:    #ff2d78;
      --neon-cyan:    #00f5ff;
      --neon-purple:  #bf00ff;
      --neon-lime:    #39ff14;
      --neon-blue:    #0062ff;
      --card-bg:      rgba(8, 4, 20, 0.55);
      --text-primary: #ffffff;
      --text-muted:   rgba(255,255,255,0.62);
      --radius:       22px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Animated neon gradient background ── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: 'DM Sans', sans-serif;
      background: #06010f;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg,
        #0d0020 0%,
        #0a0030 20%,
        #00103a 40%,
        #001a1a 60%,
        #1a0030 80%,
        #0d0020 100%
      );
    }

    /* Neon orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift linear infinite;
      z-index: 0;
    }
    .orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, var(--neon-purple) 0%, transparent 70%);
      top: -120px; left: -80px;
      animation-duration: 18s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, var(--neon-pink) 0%, transparent 70%);
      bottom: -100px; right: -60px;
      animation-duration: 22s;
      animation-direction: reverse;
    }
    .orb-3 {
      width: 340px; height: 340px;
      background: radial-gradient(circle, var(--neon-cyan) 0%, transparent 70%);
      top: 40%; left: 55%;
      animation-duration: 28s;
    }
    .orb-4 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, var(--neon-lime) 0%, transparent 70%);
      bottom: 15%; left: 5%;
      animation-duration: 24s;
      animation-direction: reverse;
      opacity: 0.3;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(40px, -30px) scale(1.08); }
      66%  { transform: translate(-25px, 40px) scale(0.95); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* Subtle grid overlay */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 2.8rem 2.4rem 2.6rem;
      box-shadow:
        0 0 0 1px rgba(191,0,255,0.18),
        0 24px 60px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.08);

      /* entrance animation */
      animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(36px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Glowing top border */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        var(--neon-cyan) 30%,
        var(--neon-pink) 70%,
        transparent
      );
      border-radius: 100%;
      opacity: 0.8;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.4rem;
      animation: cardIn 0.9s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      color: #fff;
      letter-spacing: -1px;
      position: relative;
      box-shadow:
        0 0 0 3px rgba(8,4,20,0.7),
        0 0 0 4px rgba(191,0,255,0.5),
        0 0 30px rgba(0,245,255,0.35),
        0 0 60px rgba(191,0,255,0.2);
      animation: avatarPulse 4s ease-in-out infinite;
    }

    @keyframes avatarPulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(8,4,20,0.7), 0 0 0 4px rgba(191,0,255,0.5), 0 0 30px rgba(0,245,255,0.35), 0 0 60px rgba(191,0,255,0.2); }
      50%       { box-shadow: 0 0 0 3px rgba(8,4,20,0.7), 0 0 0 4px rgba(0,245,255,0.6), 0 0 40px rgba(191,0,255,0.45), 0 0 80px rgba(0,245,255,0.25); }
    }

    /* ── Name & Bio ── */
    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.65rem;
      color: var(--text-primary);
      text-align: center;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 0.55rem;
      animation: cardIn 0.9s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    .handle {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 0.82rem;
      color: var(--neon-cyan);
      text-align: center;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
      opacity: 0.85;
      animation: cardIn 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    .bio {
      font-size: 0.92rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.65;
      margin-bottom: 2rem;
      font-weight: 300;
      animation: cardIn 0.9s 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── Divider ── */
    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
      border-radius: 2px;
      margin: 0 auto 1.6rem;
      animation: cardIn 0.9s 0.28s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── Buttons ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.85rem 1.3rem;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    /* stagger entrance */
    .btn:nth-child(1) { animation: cardIn 0.8s 0.35s cubic-bezier(0.22,1,0.36,1) both; }
    .btn:nth-child(2) { animation: cardIn 0.8s 0.43s cubic-bezier(0.22,1,0.36,1) both; }
    .btn:nth-child(3) { animation: cardIn 0.8s 0.51s cubic-bezier(0.22,1,0.36,1) both; }
    .btn:nth-child(4) { animation: cardIn 0.8s 0.59s cubic-bezier(0.22,1,0.36,1) both; }

    .btn .icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.18s ease;
    }
    .btn .icon svg { width: 18px; height: 18px; fill: #fff; }

    .btn .label { flex: 1; }
    .btn .arrow {
      opacity: 0.4;
      transition: opacity 0.18s, transform 0.18s;
      font-size: 1rem;
    }

    /* GitHub */
    .btn-github .icon  { background: linear-gradient(135deg, #333, #555); }
    .btn-github:hover  { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.09); box-shadow: 0 6px 24px rgba(0,0,0,0.4); }

    /* LinkedIn */
    .btn-linkedin .icon { background: linear-gradient(135deg, #0077b5, #00a0dc); }
    .btn-linkedin:hover  { border-color: rgba(0,162,255,0.45); background: rgba(0,120,200,0.15); box-shadow: 0 6px 24px rgba(0,120,200,0.25); }

    /* Email */
    .btn-email .icon { background: linear-gradient(135deg, var(--neon-pink), #c2006a); }
    .btn-email:hover  { border-color: rgba(255,45,120,0.45); background: rgba(255,45,120,0.1); box-shadow: 0 6px 24px rgba(255,45,120,0.2); }

    /* Facebook */
    .btn-facebook .icon { background: linear-gradient(135deg, #1877f2, #0059d1); }
    .btn-facebook:hover  { border-color: rgba(24,119,242,0.45); background: rgba(24,119,242,0.12); box-shadow: 0 6px 24px rgba(24,119,242,0.22); }

    .btn:hover { transform: translateY(-2px); }
    .btn:hover .arrow { opacity: 0.9; transform: translateX(3px); }
    .btn:hover .icon  { transform: scale(1.08); }

    /* Click ripple */
    .btn:active { transform: scale(0.97); }
    .btn.pulse-click {
      animation: btnClick 0.35s ease forwards !important;
    }
    @keyframes btnClick {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.96); }
      100% { transform: scale(1); }
    }

    /* ── Footer ── */
    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
      animation: cardIn 0.9s 0.65s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 2.2rem 1.5rem 2rem; max-width: 96vw; }
      .name { font-size: 1.45rem; }
      .avatar { width: 82px; height: 82px; font-size: 1.7rem; }
    }
  </style>
</head>

  <script>
    // Click pulse feedback on buttons
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', function () {
        this.classList.remove('pulse-click');
        void this.offsetWidth; // reflow trick to restart animation
        this.classList.add('pulse-click');
        setTimeout(() => this.classList.remove('pulse-click'), 380);
      });
    });
  </script>
